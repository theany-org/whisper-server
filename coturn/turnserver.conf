# ─── Network ──────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Public IP of this server — set via COTURN_EXTERNAL_IP env var
external-ip=${COTURN_EXTERNAL_IP}

# ─── Realm ────────────────────────────────────────────────────────────────────
realm=${COTURN_REALM}
server-name=${COTURN_REALM}

# ─── Auth — TURN REST API (time-limited HMAC credentials) ────────────────────
use-auth-secret
static-auth-secret=${COTURN_SECRET}

# ─── Relay port range (open these in your firewall) ──────────────────────────
min-port=49152
max-port=65535

# ─── Security ─────────────────────────────────────────────────────────────────
no-multicast-peers
denied-peer-ip=127.0.0.0-127.255.255.255

# ─── Logging ──────────────────────────────────────────────────────────────────
log-file=/var/log/coturn/turnserver.log
verbose
